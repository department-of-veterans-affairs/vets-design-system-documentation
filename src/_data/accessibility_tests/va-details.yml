  # 4.1.2 subtest - Summary has clear accessible name from label prop
  - id: WEB-412-001
    test_results:
      - version: unreleased (base 56.0.0)
        tester: Jeana Clark
        date: 2026-03-03
        environments:
          - name: mac-safari-voiceover
            result: pass
          - name: windows-chrome-jaws
            result: pass
          - name: windows-edge-nvda
            result: pass
          - name: ios-safari-voiceover
            result: pass
        notes: Accessible name is derived from the label prop and is announced correctly across all environments including iOS VoiceOver.

  # 4.1.2 subtest - Screen reader announces expanded/collapsed state
  - id: WEB-412-002
    test_results:
      - version: unreleased (base 56.0.0) 
        tester: Jeana Clark
        date: 2026-03-04
        environments:
          - name: mac-safari-voiceover
            result: pass
          - name: windows-chrome-jaws
            result: pass
          - name: windows-edge-nvda
            result: pass
          - name: android-chrome-talkback
            result: pass
          - name: ios-safari-voiceover
            result: pass
        notes: iOS VoiceOver prevents native details interaction in the shadow DOM. We are overriding the default details event handling with manual open attribute management to enable functionality in iOS VoiceOver. Additionally, we added a short timeout to prevent the VoiceOver announcement from getting cut off.

  # Implementation-level tests
  # 4.1.2 subtest - Summary has clear and unique accessible name from label prop
  - id: DST-412-003
    category: implementation
    test_results:
      - version: unreleased (base 56.0.0) 
        notes: Implementation-level test. Teams using this component are responsible for verifying content sequence in context. When there are multiple instances on a page, each has a unique label

