component: va-details
component_url: /components/details/
storybook_url: /storybook/?path=/docs/components-va-details--docs

tests:

  # 1.1.1 - Decorative chevron icon not announced by screen readers
  - id: WEB-111-003
    test_results:
      - version: unreleased (base 56.0.0) 
        tester: Jeana Clark
        date: 2026-03-03
        environments:
          - name: mac-safari-voiceover
            result: pass
          - name: windows-chrome-jaws
            result: pass
          - name: windows-edge-nvda
            result: pass
          - name: ios-safari-voiceover
            result: pass
          - name: android-chrome-talkback
            result: pass
        notes: Chrome announces "disclosure triangle" as the role description for the native summary element — this is browser-native behavior, not an announcement of the decorative chevron icon. The icon itself is not announced.

