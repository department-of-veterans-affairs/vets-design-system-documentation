# WCAG Principle 4: Robust
# Content must be robust enough that it can be interpreted by a wide variety of user agents, including assistive technologies.
# Tests: WEB-4xx series

tests:
  - id: WEB-412
    category: general
    wcag_criterion: 4.1.2
    wcag_name: Name, Role, Value
    wcag_level: A
    508_severity: Critical
    governance_severity: High-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#name-role-value
    description_short: |
      Every interactive element has a clear name and purpose.
    description_full: |
      When you interact with interactive elements such as links and buttons,
      you can easily understand what they are and what they do based on their accessible names and roles.
    automation_coverage: partial
    automation_notes: >-
      Parent test. See subtests for specific automated checks.
    subtests:
      - id: WEB-412-001
        description_short: |
          Every interactive element has a clear name and purpose.
        description_full: |
          When you interact with interactive elements such as links and buttons,
          you can easily understand what they are and what they do based on their accessible names and roles.
        automation_coverage: partial
        automation_notes: >-
          Custom test recommended. axe-core 'button-name, link-name' catches buttons and links without
          accessible names but can't evaluate whether those names are meaningful or descriptive. Applies to
          all interactive components. Assert buttons have non-empty accessible name via aria-label,
          aria-labelledby, or text content. Assert links have descriptive text. Manual review needed
          for name meaningfulness.
      - id: WEB-412-002
        category: screen_reader
        description_short: |
          Screen readers announce state.
        description_full: |
          When you use a screen reader,
          you hear announcements for dynamic states like expanded, checked, or disabled.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies when component has dynamic states (expanded, checked, pressed,
          disabled, selected, open, current). Assert aria-expanded, aria-checked, aria-pressed,
          aria-disabled, aria-selected, or aria-current attributes update correctly on interaction.
          For details/dialog elements, verify the open attribute toggles. Manual review still needed
          to verify screen reader announces state changes.
      - id: WEB-412-003
        description_short: |
          Links navigate to pages; buttons perform actions.
        description_full: |
          When you activate a link, it takes you to a new page or section.
          When you activate a button, it performs an action on the current page.
        automation_coverage: full
        automation_notes: >-
          Custom test needed. Applies when component contains both links and buttons. Click link, assert URL
          changes. Click button, assert no URL change and action occurs on current page.
      - id: VADS-412-001
        description_short: |
          Link navigates to a new page or section.
        description_full: |
          When you activate a link,
          you are taken to a different page or a section on the current page.
        automation_coverage: full
        automation_notes: >-
          Custom test needed. Applies when component is a link. Click link, verify navigation occurs via URL
          change or anchor scroll.
      - id: VADS-412-002
        description_short: |
          Button performs an action on the current page.
        description_full: |
          When you activate a button,
          you find that it performs an action on the current page.
        automation_coverage: full
        automation_notes: >-
          Custom test needed. Applies when component is a button. Click button, assert
          window.location.href is unchanged, and verify expected action occurs on the current page.
      - id: VADS-412-003
        description_short: |
          Labels on repeated interactive elements describe their specific purpose.
        description_full: |
          When you view a page that has multiple interactive elements with similar functions,
          you find that each element's label describes its specific purpose and what it applies to.
        automation_coverage: partial
        automation_notes: >-
          VA best practice — WCAG does not require unique labels, but descriptive labels that
          differentiate repeated elements improve usability for screen reader and voice control users.
          No component-level test needed — this can only be verified when multiple instances exist on
          the same page. Collect accessible names from all interactive elements of the same type (e.g.,
          all buttons labeled "Edit"). Flag duplicates for manual review — identical names on elements
          with different purposes indicate a failure. Manual review still needed to verify labels are
          descriptive of their specific context.
  - id: WEB-413
    category: screen_reader
    wcag_criterion: 4.1.3
    wcag_name: Status Messages
    wcag_level: AA
    508_severity: N/A
    governance_severity: High
    wcag_url: https://www.w3.org/TR/WCAG22/#status-messages
    description_short: |
      Screen readers announce important updates.
    description_full: |
      When you're using a screen reader and a status message appears on the page,
      you hear it announced without needing to move focus to the message.
    automation_coverage: partial
    automation_notes: >-
      Parent test. Applies when component updates status dynamically. See subtests for specific scenarios.
    subtests:
      - id: VADS-413-001
        category: screen_reader
        description_short: |
          Screen readers announce loading status.
        description_full: |
          When you trigger an action that displays a loading indicator,
          you hear a screen reader announcement that content is loading.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies when component displays loading states. Assert aria-live region updates
          during loading, or loading indicator has role='status'. Manual review still needed to verify screen
          reader announces loading at correct timing.
      - id: VADS-413-002
        category: screen_reader
        description_short: |
          Screen readers announce alerts.
        description_full: |
          When an alert appears on the page,
          you hear a screen reader announcement with the alert message without needing to move focus to it.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies when component displays alerts. Assert alert element has role='alert'
          or aria-live='assertive'. Manual review still needed to verify screen reader announces alert without
          requiring focus move.
