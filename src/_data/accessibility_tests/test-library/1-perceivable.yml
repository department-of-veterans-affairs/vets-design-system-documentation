# WCAG Principle 1: Perceivable
# Information and user interface components must be presentable to users in ways they can perceive
# Tests: WEB-1xx series

tests:
  - id: WEB-111
    category: screen_reader
    wcag_criterion: 1.1.1
    wcag_name: Non-text content
    wcag_level: A
    508_severity: Critical
    governance_severity: Medium-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#non-text-content
    description_short: |
      Non-text content such as images, audio, and video include equivalent text alternatives.
    description_full: |
      When you view or interact with non-text content on the page,
      you hear a text summary that helps you understand its purpose.
    automation_coverage: partial
    automation_notes: >-
      Parent test. See subtests for specific automated checks.
    subtests:
      - id: WEB-111-001
        description_short: |
          Screen readers announce descriptions for meaningful images.
        description_full: |
          When you navigate to an informative image with a screen reader,
          you hear a description of the image that conveys the content and function of the image.
        automation_coverage: partial
        automation_notes: >-
          Covered by axeCheck 'image-alt', which catches missing or empty alt text on images. Manual
          review still needed to determine if the image is meaningful vs. decorative and if alt text
          accurately describes the content.
      - id: WEB-111-002
        description_short: |
          Screen readers announce both brief and detailed descriptions for graphs, maps, and charts.
        description_full: |
          When you view a complex visual element, such as a chart, graph, or diagram,
          you hear both a concise alt text description and a longer description that together provide
          all relevant information conveyed by the visual element.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies when component contains complex visuals like charts, graphs, or
          diagrams. Assert aria-describedby or longdesc attribute exists. Manual review still needed for
          description completeness and accuracy.
      - id: WEB-111-003
        description_short: |
          Screen readers don't announce decorative images.
        description_full: |
          When you navigate to a decorative image with a screen reader,
          you don't hear any information about the image.
        automation_coverage: partial
        automation_notes: >-
          Covered by axeCheck 'image-alt', which catches images missing alt handling (empty alt,
          aria-hidden, or role='presentation'). Manual review still needed to confirm images are truly
          decorative.
      - id: WEB-111-004
        description_short: |
          Background images don't convey important information.
        description_full: |
          When you view a background image on a page,
          the image is purely decorative and doesn't convey important information or functionality.
        automation_coverage: manual
      - id: WEB-111-005
        description_short: |
          Screen readers announce brief descriptions of videos and audio files.
        description_full: |
          When you navigate to video or audio content,
          you hear a short description that conveys the purpose of the content.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies when component contains video, audio, or iframe-embedded media. Assert
          an accessible name exists via aria-label, aria-labelledby, title, or a wrapping figure with
          figcaption. axe-core 'frame-title' catches iframes missing a title attribute, covering embedded
          players (YouTube, Vimeo). Manual review still needed for description quality and screen reader
          announcement.
  - id: WEB-121
    category: general
    wcag_criterion: 1.2.1
    wcag_name: Audio-only and Video-only (Prerecorded)
    wcag_level: A
    508_severity: Critical
    governance_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#audio-only-and-video-only-prerecorded
    description_short: |
      Audio and video-only content include a text transcript.
    description_full: |
      When you interact with audio-only or video-only media,
      you can find a transcript that provides the same information as presented in the original media content.
    automation_coverage: manual
  - id: WEB-122
    category: general
    wcag_criterion: 1.2.2
    wcag_name: Captions (Prerecorded)
    wcag_level: A
    508_severity: Critical
    governance_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#captions-prerecorded
    description_short: |
      Prerecorded videos provide captions.
    description_full: |
      When you view prerecorded videos,
      you find synchronized captions for dialogue, sound effects, and relevant audio.
    automation_coverage: manual
  - id: WEB-123
    category: general
    wcag_criterion: 1.2.3
    wcag_name: Audio Description or Media Alternative (Prerecorded)
    wcag_level: A
    508_severity: High
    governance_severity: High
    wcag_url: https://www.w3.org/TR/WCAG22/#audio-description-or-media-alternative-prerecorded
    description_short: |
      Videos with audio include transcripts or audio descriptions.
    description_full: |
      When you interact with video content,
      you have access to a full descriptive transcript or an audio description.
    automation_coverage: manual
  - id: WEB-124
    category: general
    wcag_criterion: 1.2.4
    wcag_name: Captions (Live)
    wcag_level: AA
    508_severity: Critical
    governance_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#captions-live
    description_short: |
      Live videos include real-time captions.
    description_full: |
      When you interact with live video content,
      you find synchronized captions generated in real-time.
    automation_coverage: manual
  - id: WEB-125
    category: general
    wcag_criterion: 1.2.5
    wcag_name: Audio Description (Prerecorded)
    wcag_level: AA
    508_severity: High
    governance_severity: High
    wcag_url: https://www.w3.org/TR/WCAG22/#audio-description-prerecorded
    description_short: |
      Videos with important visual information include audio descriptions.
    description_full: |
      When you watch a video that includes important visual information,
      you can turn on an audio description that conveys that visual information.
    automation_coverage: manual
  - id: WEB-131
    category: general
    wcag_criterion: 1.3.1
    wcag_name: Info and Relationships
    wcag_level: A
    508_severity: Critical
    governance_severity: Medium-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#info-and-relationships
    description_short: |
      Information, structure, and relationships are conveyed through code, not just presentation.
    description_full: |
      When you interact with the page,
      you find that information, structure, and relationships are conveyed through code, not just visual presentation.
    automation_coverage: partial
    automation_notes: >-
      Parent test. See subtests for specific automated checks.
    subtests:
      - id: WEB-131-001
        category: screen_reader
        description_short: |
          Headings are used to convey structure.
        description_full: |
          When you use a screen reader to navigate the page by heading,
          you find that all elements that act as content headings are included in the heading structure.
        automation_coverage: manual
      - id: WEB-131-002
        description_short: |
          Headings follow a logical order.
        description_full: |
          When you navigate the page by headings,
          you find that heading levels follow a logical order and don't skip levels.
        automation_coverage: partial
        automation_notes: >-
          Covered by axeCheck 'heading-order', which catches skipped heading levels (e.g., h2 to h4
          without h3). Manual review still needed to verify headings are logically ordered in the
          context of the full page.
      - id: WEB-131-003
        description_short: |
          Page includes one H1.
        description_full: |
          When you inspect the page,
          you find a single H1 exists for the page or screen.
        automation_coverage: full
        automation_notes: >-
          Custom page-level test needed. No component-level test needed. Use
          querySelectorAll('h1') and assert exactly one h1 exists. axe-core 'page-has-heading-one' is
          disabled in the component-library axeCheck helper because components are tested in isolation.
      - id: WEB-131-004
        description_short: |
          Screen readers announce list items.
        description_full: |
          When you use a screen reader to navigate a list,
          you hear an announcement that indicates the number of items in the list and the position of each item within the list.
        automation_coverage: partial
        automation_notes: >-
          Covered by axeCheck 'list, listitem', which catches invalid list structure (e.g., li outside ul/ol)
          but can't verify screen readers announce item count and position.
          Applies when component contains list content.
          Assert ul/ol elements contain li children and no orphaned li elements exist.
          Manual review still needed to verify screen readers announce list count and item position correctly.
      - id: WEB-131-005
        category: screen_reader
        description_short: |
          Screen readers announce related form elements as a group.
        description_full: |
          When you use a screen reader to interact with a group of related form elements, such as a set of radio buttons, checkboxes or grouped text inputs,
          you hear an announcement that includes the group label, the item label, and indicates the elements are related.
        automation_coverage: partial
        automation_notes: >-
          Custom test recommended. axe-core 'fieldset-no-legend' catches fieldset elements missing a
          legend but can't verify screen readers announce group labels and relationships. Applies when
          component groups related form elements (radio buttons, checkboxes, grouped inputs). Assert
          fieldset has legend, or role='group' with aria-labelledby. For radio groups, verify all radio
          inputs within the group share the same name attribute. Manual review still needed to verify
          screen readers announce group label and relationship.
      - id: WEB-131-006
        category: screen_reader
        description_short: |
          Screen readers announce input labels and instructions.
        description_full: |
          When you interact with the form input with a screen reader,
          you hear an announcement that includes the label, hint text, required state, and error message when applicable.
        automation: partial
        automated_check: >-
          Applies when component contains form inputs.
          Assert input has associated label via for/id or aria-labelledby.
          Check label includes hint text and required state.
          Manual review still needed to verify screen reader announces complete label including hints.
        axe_coverage: partial
        axe_rules: "label"
      - id: WEB-131-007
        category: screen_reader
        description_short: |
          Screen readers announce required fields.
        description_full: |
          When you interact with required fields using a screen reader,
          you hear an announcement indicating that the field is required.
        automation_coverage: partial
        automation_notes: >-
          Custom test recommended. axe-core 'aria-required-attr' catches missing required ARIA attributes
          but can't verify screen readers consistently announce 'required' across assistive technologies.
          Applies when component contains required form fields. Assert required attribute or
          aria-required='true' is present when required prop is set. Manual review still needed to verify
          screen readers announce 'required' consistently across NVDA, JAWS, and VoiceOver.
      - id: WEB-131-008
        category: screen_reader
        description_short: |
          Screen reader users can navigate by landmarks.
        description_full: |
          When you use a screen reader to navigate the page by landmarks,
          you find that you can easily identify and navigate to key sections of the page, such as the main content, navigation, and complementary content.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. For components that serve a landmark purpose (e.g., navigation, header,
          footer), assert the component uses the correct landmark element or role. For page-level
          testing, assert the complete set of landmark roles (main, navigation, complementary, banner,
          contentinfo) exist for key page sections. Manual review still needed to verify screen reader
          landmark navigation works correctly. axe-core 'landmark-one-main, region' is disabled in the
          component-library axeCheck helper because components are tested in isolation.
      - id: WEB-131-009
        category: screen_reader
        description_short: |
          Screen readers announce relationship between table headers and data cells.
        description_full: |
          When you use a screen reader to interact with a table,
          you hear announcements that include table headers and associations between headers and data cells,
          allowing you to understand the structure and content of the table.
        automation_coverage: partial
        automation_notes: >-
          Covered by axeCheck. Fully validates that table headers are properly associated with data cells via
          scope and headers attributes. (axe rules: th-has-data-cells, td-headers-attr).
          Manual review still needed to verify screen readers announce header-cell relationships correctly,
          especially for complex tables with multi-level headers.
      - id: WEB-131-010
        category: screen_reader
        description_short: |
          Screen readers announce parent-child relationships.
        description_full: |
          When you use a screen reader to navigate a page with nested content, such as a dropdown menu or an accordion,
          you hear announcements that clearly indicate the parent-child relationships between elements.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies when component has parent-child content structure (dropdowns,
          accordions, nested menus). Assert aria-owns, aria-controls, or proper DOM nesting. Manual review
          still needed to verify screen reader announces relationships correctly.
  - id: WEB-132
    category: general
    wcag_criterion: 1.3.2
    wcag_name: Meaningful Sequence
    wcag_level: A
    508_severity: High
    governance_severity: High
    wcag_url: https://www.w3.org/TR/WCAG22/#meaningful-sequence
    description_short: |
      Content is presented in a logical order.
    description_full: |
      When you view and interact with the page or component,
      you find that content is presented in a meaningful sequence that supports comprehension and navigation.
    automation_coverage: partial
    automation_notes: >-
      Custom test needed. Applies to all components. Compare DOM order to visual layout order. Manual
      review still needed to verify content sequence is meaningful.
  - id: WEB-133
    category: general
    wcag_criterion: 1.3.3
    wcag_name: Sensory Characteristics
    wcag_level: A
    508_severity: Critical
    governance_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#sensory-characteristics
    description_short: |
      Instructions don't rely only on visual cues to convey meaning.
    description_full: |
      When you read instructions,
      you find that they don't rely only on shape, color, or location to convey meaning.
      For example, instructions that say "click the red button" or "select the top option" wouldn't meet this criterion.
    automation_coverage: manual
  - id: WEB-134
    category: mobile
    wcag_criterion: 1.3.4
    wcag_name: Orientation
    wcag_level: AA
    508_severity: N/A
    governance_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#orientation
    description_short: |
      Content is available in both portrait and landscape orientations.
    description_full: |
      When you rotate your device,
      you see that content remains visible and functional in both portrait and landscape orientations.
    automation_coverage: partial
    automation_notes: >-
      Custom test needed. Applies to all components. Test rendering at portrait (375x667) and landscape
      (667x375) viewports. Manual review still needed for edge cases on real devices.
  - id: WEB-135
    category: general
    wcag_criterion: 1.3.5
    wcag_name: Identify Input Purpose
    wcag_level: AA
    508_severity: N/A
    governance_severity: High
    wcag_url: https://www.w3.org/TR/WCAG22/#identify-input-purpose
    description_short: |
      Form fields support autofill for common information.
    description_full: |
      When you begin typing in a form field that asks for common information like your name or address,
      your browser offers to autofill the field.
    automation_coverage: partial
    automation_notes: >-
      Custom test recommended. axe-core 'autocomplete-valid' validates that existing autocomplete 
      attribute values match the HTML spec, but can't detect missing autocomplete attributes. Applies 
      when component contains form inputs collecting common user information (name, email, address, 
      phone, etc.). Assert that appropriate autocomplete attribute is present and has a valid value 
      from the WCAG 1.3.5 token list. Manual review still needed to verify the autocomplete value 
      matches the input's actual purpose.
  - id: WEB-141
    category: visual
    wcag_criterion: 1.4.1
    wcag_name: Use of Color
    wcag_level: A
    508_severity: Critical
    governance_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#use-of-color
    description_short: |
      Color is not the only method used to convey information.
    description_full: |
      When you view the page or component,
      you find that anything shown by color is also communicated through another visual cue like shape or text.
    automation_coverage: manual
    subtests:
      - id: VADS-141-001
        description_short: |
          Links are indicated with more than just color.
        description_full: |
          When you view a link,
          you see that the link has a text underline and uses the expected VA colors for default, hover, focus, and visited states.
        automation_coverage: full
        automation_notes: >-
          Custom test needed. Applies when component contains links. Assert text-decoration includes
          underline on link elements.
  - id: WEB-142
    category: general
    wcag_criterion: 1.4.2
    wcag_name: Audio Control
    wcag_level: A
    508_severity: High
    governance_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#audio-control
    description_short: |
      Users can pause auto-playing audio or control its volume.
    description_full: |
      When you encounter audio that plays automatically for more than 3 seconds,
      you find you can pause it or it has an independent volume control.
    automation_coverage: manual
  - id: WEB-143
    category: visual
    wcag_criterion: 1.4.3
    wcag_name: Contrast (Minimum)
    wcag_level: AA
    508_severity: Medium
    governance_severity: Medium-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#contrast-minimum
    description_short: |
      Text has sufficient contrast against its background.
    description_full: |
      When you use a contrast checker tool to compare the color of text against its background,
      you find that it has a contrast ratio of at least 4.5:1.
    automation_coverage: full
    automation_notes: >-
      Covered by axeCheck 'color-contrast'. Fully checks text-to-background color contrast ratios
      against WCAG 4.5:1 minimum.
  - id: WEB-144
    category: visual
    wcag_criterion: 1.4.4
    wcag_name: Resize Text
    wcag_level: AA
    508_severity: Medium
    governance_severity: Medium-High
    wcag_url: https://www.w3.org/TR/WCAG22/#resize-text
    description_short: |
      Text resizes to 200% without loss of content or functionality.
    description_full: |
      When you increase text size up to 200%,
      all content remains visible and functional without needing to scroll both horizontally and vertically.
    automation_coverage: partial
    automation_notes: >-
      Custom test needed. Applies to all components. Set viewport to 200% zoom and check for content
      overflow. Manual review still needed for subtle content or functionality loss.
  - id: WEB-145
    category: general
    wcag_criterion: 1.4.5
    wcag_name: Images of Text
    wcag_level: AA
    508_severity: Critical
    governance_severity: High-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#images-of-text
    description_short: |
      Text isn't presented as images.
    description_full: |
      When you view the component or page,
      you find that text is rendered as real text, not as an image of text.
    automation_coverage: manual
  - id: WEB-1410
    category: zoom
    wcag_criterion: 1.4.10
    wcag_name: Reflow
    wcag_level: AA
    508_severity: N/A
    governance_severity: High-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#reflow
    description_short: |
      Content adapts to small screens and zoom.
    description_full: |
      When you zoom in 400% on a viewport that is 1280 pixels wide,
      you can see and interact with all content without needing to scroll both horizontally and vertically.
    automation_coverage: partial
    automation_notes: >-
      Parent test. See subtests for specific automated checks.
    subtests:
      - id: VADS-1410-001
        description_short: |
          Component content doesn't overflow or get clipped at 400% zoom.
        description_full: |
          When you zoom in to 400% on a viewport that is 1280 pixels wide,
          you find that the component's content isn't cut off, overlapping, or hidden.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies to all components. Set viewport width to 320px (simulating 400% zoom on
          1280px). Check component for overflow or clipping. Manual review still needed for subtle visual
          issues.
  - id: WEB-1411
    category: visual
    wcag_criterion: 1.4.11
    wcag_name: Non-text Contrast
    wcag_level: AA
    508_severity: N/A
    governance_severity: High-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#non-text-contrast
    description_short: |
      Meaningful graphic elements have sufficient contrast against their background.
    description_full: |
      When you view an interactive or graphic element on the page,
      you find that meaningful visual information has a contrast ratio of at least 3:1 against its background.
    automation_coverage: partial
    automation_notes: >-
      Parent test. See subtests for specific automated checks.
    subtests:
      - id: WEB-1411-001
        description_short: |
          Interactive elements have sufficient contrast against their surroundings.
        description_full: |
          When you use a color contrast checker tool to compare the color of an interactive element against its surroundings,
          you find it has a contrast ratio of at least 3:1.
        automation_coverage: partial
        automation_notes: >-
          Custom test recommended. axe-core 'link-in-text-block, color-contrast' checks text contrast
          and link distinguishability but can't evaluate non-text element contrast like borders, icons, or
          state-dependent colors. Applies when component contains interactive elements. Use
          getComputedStyle() to check element colors against adjacent backgrounds. Manual review still needed
          for gradients, image backgrounds, and state-dependent colors.
      - id: WEB-1411-002
        description_short: |
          Meaningful icons and graphic elements have sufficient contrast.
        description_full: |
          When you use a color contrast checker tool to compare the color of a meaningful icon and graphic element against its background,
          you find it has a contrast ratio of at least 3:1.
        automation_coverage: manual
      - id: VADS-1411-001
        description_short: |
          Icons have sufficient contrast against their background.
        description_full: |
          When you use a color contrast checker tool to compare the color of an icon against its background,
          you find it has a contrast ratio of at least 3:1.
        automation_coverage: manual
      - id: VADS-1411-002
        description_short: |
          Form inputs have sufficient contrast against their surroundings.
        description_full: |
          When you use a color contrast checker tool to compare the color of a form input against its surroundings,
          you find it has a contrast ratio of at least 3:1.
        automation_coverage: partial
        automation_notes: >-
          Custom test needed. Applies when component contains form inputs. Check form input border color
          contrast ratio against surrounding background. Manual review still needed for complex or image
          backgrounds.
  - id: WEB-1412
    category: general
    wcag_criterion: 1.4.12
    wcag_name: Text Spacing
    wcag_level: AA
    508_severity: N/A
    governance_severity: Low-Medium
    wcag_url: https://www.w3.org/TR/WCAG22/#text-spacing
    description_short: |
      Text remains readable when spacing is adjusted.
    description_full: |
      When you adjust text spacing (line spacing to 1.5x font size, letter spacing to 0.12x, word spacing to 0.16x),
      you find that no content or functionality is lost.
    automation_coverage: full
    automation_notes: >-
      Custom test needed. Applies to all components with text content. Inject CSS spacing overrides
      (line-height: 1.5em, letter-spacing: 0.12em, word-spacing: 0.16em) and check for content overflow or
      clipping.
  - id: WEB-1413
    category: keyboard
    wcag_criterion: 1.4.13
    wcag_name: Content on Hover or Focus
    wcag_level: AA
    508_severity: N/A
    governance_severity: High-Critical
    wcag_url: https://www.w3.org/TR/WCAG22/#content-on-hover-or-focus
    description_short: |
      Users can dismiss content that appears on hover or focus.
    description_full: |
      When you encounter content that appears when you hover over or focus on an element,
      you are able to dismiss it without moving the pointer or focus.
    automation_coverage: full
    automation_notes: >-
      Custom test needed. Applies when component shows content on hover or focus. See subtests for
      specific checks.
    subtests:
      - id: VADS-1413-001
        description_short: |
          Hover content remains visible when you move the pointer into it.
        description_full: |
          When content appears on hover and you move your pointer from the trigger into the new content,
          the content stays visible.
        automation_coverage: full
        automation_notes: >-
          Custom test needed. Applies when component shows content on hover. Hover trigger element, move
          pointer into revealed content, assert content stays visible.
      - id: VADS-1413-002
        description_short: |
          Hover content can be dismissed with Escape.
        description_full: |
          When content appears on hover or focus,
          you can dismiss it by pressing the Escape key without moving focus.
        automation_coverage: full
        automation_notes: >-
          Custom test needed. Applies when component shows content on hover or focus. Trigger content, press
          Escape, assert content is dismissed.
