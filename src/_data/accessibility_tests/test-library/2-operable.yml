# WCAG Principle 2: Operable
# User interface components and navigation must be operable.
# Tests: WEB-2xx series

tests:
  - id: WEB-211
    category: keyboard
    wcag_criterion: 2.1.1
    wcag_name: Keyboard
    wcag_level: A
    508_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG21/#keyboard
    description_short: |
      Interactive elements are fully operable using only a keyboard.
    description_full: |
      When you access an interactive element using only a keyboard,
      you can navigate to the element, activate it, and navigate away from it.
    subtests:
      - id: DST-211-001
        description_short: |
          Link is fully operable using only a keyboard.
        description_full: |
          When you interact with a link using only a keyboard,
          you can navigate to the link, activate it, and navigate away from it.
      - id: DST-211-002
        description_short: |
          Form inputs are fully operable using only a keyboard.
        description_full: |
          When you interact with a form input using only a keyboard,
          you can navigate to the input, update the value, and navigate away from it.
  - id: WEB-212
    category: keyboard
    wcag_criterion: 2.1.2
    wcag_name: No Keyboard Trap
    wcag_level: A
    508_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG21/#no-keyboard-trap
    description_short: |
      Keyboard focus does not get trapped.
    description_full: |
      When you move focus to an interactive element with a keyboard,
      you can move focus away from that element using only standard keyboard keys (Tab, Shift+Tab, arrow keys, or Escape).
    subtests:
      - id: DST-212-001
        description_short: |
          Links do not trap keyboard focus.
        description_full: |
          When you navigate to the link using a keyboard,
          you can move focus away from the link using only standard keyboard keys (Tab, Shift+Tab, arrow keys, or Escape).
      - id: DST-212-002
        description_short: |
          Form inputs do not trap keyboard focus.
        description_full: |
          When you navigate to a form input using a keyboard,
          you can move focus away from the input using only standard keyboard keys (Tab, Shift+Tab, arrow keys, or Escape).
  - id: WEB-214
    category: keyboard
    wcag_criterion: 2.1.4
    wcag_name: Character Key Shortcuts
    wcag_level: A
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG21/#character-key-shortcuts
    description_short: |
      Users can turn off or customize single-key shortcuts.
    description_full: |
      When you encounter single-character keyboard shortcuts,
      you find they can be turned off, remapped to include modifiers, or are active only when the component has focus.
  - id: WEB-221
    category: general
    wcag_criterion: 2.2.1
    wcag_name: Timing Adjustable
    wcag_level: A
    508_severity: Medium
    wcag_url: https://www.w3.org/TR/WCAG21/#timing-adjustable
    description_short: |
      Content allows users to turn off or extend time limits.
    description_full: |
      When you encounter a time limit,
      you find it can be disabled, extended (with a 20-second warning and the ability to extend at least ten times), or significantly adjusted unless timing is essential.
  - id: WEB-222
    category: general
    wcag_criterion: 2.2.2
    wcag_name: Pause, Stop, Hide
    wcag_level: A
    508_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG21/#pause-stop-hide
    description_short: |
      Movement can be paused or stopped.
    description_full: |
      When you view moving, blinking, scrolling, or auto-updating content that starts automatically and lasts over 5 seconds,
      you find mechanisms to pause, stop, hide, or control its frequency.
  - id: WEB-231
    category: general
    wcag_criterion: 2.3.1
    wcag_name: Three Flashes or Below Threshold
    wcag_level: A
    508_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG21/#three-flashes-or-below-threshold
    description_short: |
      Nothing flashes more than three times per second.
    description_full: |
      When you view the page,
      you find no content flashes more than three times per any one-second period.
  - id: WEB-241
    category: general
    wcag_criterion: 2.4.1
    wcag_name: Bypass Blocks
    wcag_level: A
    508_severity: High
    wcag_url: https://www.w3.org/TR/WCAG21/#bypass-blocks
    description_short: |
      Users can skip repeated content like headers and navigation.
    description_full: |
      When you navigate the page,
      you find a mechanism to bypass repeated blocks of content such as a skip link or HTML5 landmarks.
    subtests:
      - id: DST-241-001
        description_short: |
          Skip link allows users to bypass repeated content.
        description_full: |
          When you navigate the page with a keyboard,
          you find a skip link at the beginning of the page that allows you to bypass repeated content and jump directly to the main content.
  - id: WEB-242
    category: general
    wcag_criterion: 2.4.2
    wcag_name: Page Titled
    wcag_level: A
    508_severity: Low
    wcag_url: https://www.w3.org/TR/WCAG21/#page-titled
    description_short: |
      Each page includes a unique, descriptive title.
    description_full: |
      When you open a new page,
      you find it has a unique and descriptive title reflecting the page's purpose.
  - id: WEB-243
    category: keyboard
    wcag_criterion: 2.4.3
    wcag_name: Focus Order
    wcag_level: A
    508_severity: High
    wcag_url: https://www.w3.org/TR/WCAG21/#focus-order
    description_short: |
      Tab order follows a logical sequence.
    description_full: |
      When you navigate the page or component with a keyboard,
      you find focus moves through interactive elements in a meaningful order.
  - id: WEB-244
    category: general
    wcag_criterion: 2.4.4
    wcag_name: Link Purpose (In Context)
    wcag_level: A
    508_severity: High
    wcag_url: https://www.w3.org/TR/WCAG21/#link-purpose-in-context
    description_short: |
      Link text is clear and descriptive.
    description_full: |
      When you read the link text,
      it is easy to understand both the link's purpose and destination.
  - id: WEB-245
    category: general
    wcag_criterion: 2.4.5
    wcag_name: Multiple Ways
    wcag_level: AA
    508_severity: Low
    wcag_url: https://www.w3.org/TR/WCAG21/#multiple-ways
    description_short: |
      There is more than one way to access a page.
    description_full: |
      When you navigate the site,
      you find more than one way to access important pages,
      such as through a link in the main navigation and a link within the page content.
  - id: WEB-246
    category: general
    wcag_criterion: 2.4.6
    wcag_name: Headings and Labels
    wcag_level: AA
    508_severity: Medium
    wcag_url: https://www.w3.org/TR/WCAG21/#headings-and-labels
    description_short: |
      Headings and labels clearly describe their purpose.
    description_full: |
      When you view headings and labels,
      you find they are descriptive of their content and purpose.
    subtests:
      - id: WEB-246-001
        description_short: |
          Headings are descriptive.
        description_full: |
          When you read heading text,
          you find that it accurately describes the topic or purpose of the content that follows.
      - id: WEB-246-002
        description_short: |
          Input labels are descriptive.
        description_full: |
          When you read an input label,
          you find that its accurately describes the purpose of the input field and the expected value.
  - id: WEB-247
    category: keyboard
    wcag_criterion: 2.4.7
    wcag_name: Focus Visible
    wcag_level: AA
    508_severity: Critical
    wcag_url: https://www.w3.org/TR/WCAG21/#focus-visible
    description_short: |
      Interactive elements display a clear focus indicator.
    description_full: |
      When you navigate to an interactive element with a keyboard,
      you see a clear visual indicator around the element showing that it has focus.
  - id: WEB-2410
    category: general
    wcag_criterion: 2.4.10
    wcag_name: Section Headings
    wcag_level: AAA
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG21/#section-headings
    description_short: |
      Content uses headings to organize sections.
    description_full: |
      When you read content that is organized in sections,
      you find that each section has a descriptive heading that helps you understand the section and what it's about.
  - id: WEB-2411
    category: keyboard
    wcag_criterion: 2.4.11
    wcag_name: Focus Not Obscured (Minimum)
    wcag_level: AA
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG22/#focus-not-obscured-minimum
    description_short: |
      Focused elements are fully visible.
    description_full: |
      When you focus on an element with a keyboard,
      you see that the element that has focus remains visible on screen and is not obscured
      by sticky headers, footers, modals, tooltips, or other overlaying content.
  - id: WEB-251
    category: general
    wcag_criterion: 2.5.1
    wcag_name: Pointer Gestures
    wcag_level: A
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG21/#pointer-gestures
    description_short: |
      Interaction doesn't require complex gestures.
    description_full: |
      When you interact with the page using a pointer device, such as a mouse, touchscreen, or stylus,
      you find that all functionality is operable with simple pointer actions like taps or clicks,
      rather than requiring complex gestures like swiping, pinching, or dragging.
  - id: WEB-252
    category: general
    wcag_criterion: 2.5.2
    wcag_name: Pointer Cancellation
    wcag_level: A
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG21/#pointer-cancellation
    description_short: |
      Pointer actions are reversible and don't execute on touch down.
    description_full: |
      When you interact with the page using a pointer device, such as a mouse, touchscreen, or stylus,
      you find they execute on the up-event and can be cancelled before release.
  - id: WEB-253
    category: voice_control
    wcag_criterion: 2.5.3
    wcag_name: Label in Name
    wcag_level: A
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG21/#label-in-name
    description_short: |
      Accessible name matches visible text.
    description_full: |
      When you inspect an interactive element that has visible text,
      you find that the accessible name matches the visible text for that element.
    subtests:
      - id: DST-253-001
        category: screen_reader
        description_short: |
          Screen reader announcements match visible text.
        description_full: |
          When you focus on an interactive element with a screen reader,
          you hear an announcement that matches the element's visible text.
  - id: WEB-254
    category: mobile
    wcag_criterion: 2.5.4
    wcag_name: Motion Actuation
    wcag_level: A
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG21/#motion-actuation
    description_short: |
      Features don't require shaking or tilting the device.
    description_full: |
      When you use motion-activated features,
      you find alternative input methods and the ability to disable them.
  - id: WEB-257
    category: general
    wcag_criterion: 2.5.7
    wcag_name: Dragging Movements
    wcag_level: AA
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG22/#dragging-movements
    description_short: |
      Drag-and-drop actions have click-based alternatives.
    description_full: |
      When you interact with a component that offers drag functionality,
      you find that functionality is also available through click, keyboard, or other non-dragging methods.
  - id: WEB-258
    category: general
    wcag_criterion: 2.5.8
    wcag_name: Target Size (Minimum)
    wcag_level: AA
    508_severity: N/A
    wcag_url: https://www.w3.org/TR/WCAG22/#target-size-minimum
    description_short: |
      Interactive element size is at least 24 pixels.
    description_full: |
      When you inspect the size of interactive elements on the page,
      you find that each element has a target size of at least 24x24 pixels.
    subtests:
      - id: DST-258-001
        description_short: |
         Link target size is at least 24 pixels.
        description_full: |
          When you inspect the size of links on the page,
          you find that each link has a target size of at least 24x24 pixels.
